<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Семейная хроника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                            400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                            800: '#065f46', 900: '#064e3b',
                        },
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1',
                            400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155',
                            800: '#1e293b', 900: '#0f172a', 950: '#020617',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans antialiased flex flex-col min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200/80 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-md">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 18a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2"/><rect x="3" y="6" width="18" height="12" rx="2"/></svg>
                </div>
                <span class="font-bold text-slate-900 dark:text-white text-lg">Семейная хроника</span>
            </a>
            <div class="flex items-center gap-3">
                <button id="themeToggle" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                    🌓
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Регистрация</h1>
                <p class="text-slate-600 dark:text-slate-400 mt-2">Создайте аккаунт и начните свою семейную историю</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Имя</label>
                    <input type="text" id="regFirstName" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Фамилия</label>
                    <input type="text" id="regLastName" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                    <input type="email" id="regEmail" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Пароль</label>
                    <input type="password" id="regPassword" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Подтвердите пароль</label>
                    <input type="password" id="regPasswordConfirm" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500">
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="terms" required class="rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    <label class="text-sm text-slate-700 dark:text-slate-300">Я принимаю <a href="/terms" class="text-emerald-600 hover:underline">условия пользовательского соглашения</a></label>
                </div>
                <button type="submit" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition shadow-sm">Зарегистрироваться</button>
            </form>

            <div class="mt-6 text-center text-sm text-slate-600 dark:text-slate-400">
                Уже есть аккаунт?
                <a href="/login" class="text-emerald-600 hover:text-emerald-700 dark:text-emerald-400 font-medium hover:underline">Войти</a>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-200 dark:border-slate-800 py-6">
        <div class="max-w-7xl mx-auto px-4 text-center text-sm text-slate-500">
            © 2026 Семейная хроника · Сохраняем историю вместе
        </div>
    </footer>

    <script>
        const root = document.documentElement;
        function setTheme(theme) {
            if (theme === 'dark') { root.classList.add('dark'); localStorage.setItem('theme', 'dark'); }
            else { root.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
        }
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) setTheme('dark');
        else setTheme('light');
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = root.classList.contains('dark');
            setTheme(isDark ? 'light' : 'dark');
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regPasswordConfirm').value;
            if (password !== confirm) {
                alert('Пароли не совпадают');
                return;
            }
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            // Пока заглушка
            alert(`Регистрация: ${firstName} ${lastName}, ${email}\n(пока демо, подключите бэкенд)`);
        });
    </script>
</body>
</html>
