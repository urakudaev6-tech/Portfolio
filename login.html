<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Вход — Семейная хроника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { emerald: { 600: '#059669' }, slate: { 800: '#1e293b' } } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 font-sans antialiased">

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-8 shadow-sm">
            <div class="text-center mb-6">
                <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center mx-auto shadow-md">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 18a2 2 0 0 0-2-2H9a2 2 0 0 0-2 2"/><rect x="3" y="6" width="18" height="12" rx="2"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white mt-4">Вход в аккаунт</h2>
                <p class="text-slate-500 text-sm mt-1">Войдите, чтобы продолжить</p>
            </div>

            <!-- Форма отправляет данные на /login методом POST -->
            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Имя пользователя</label>
                    <input type="text" name="username" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Пароль</label>
                    <input type="password" name="password" required class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-emerald-500 transition">
                </div>
                {% if error %}
                <div class="mb-4 text-sm text-red-600 text-center">{{ error }}</div>
                {% endif %}
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg transition shadow-sm">Войти</button>
            </form>

            <p class="text-center text-sm text-slate-500 mt-6">
                Нет аккаунта? <a href="/register" class="text-emerald-600 hover:underline">Зарегистрироваться</a>
            </p>
            <p class="text-center text-xs text-slate-400 mt-4">
                Тестовые данные: admin / admin
            </p>
        </div>
    </div>

    <script>
        // Тёмная тема (сохраняем выбранную)
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        } else {
            root.classList.remove('dark');
            localStorage.setItem('theme', 'light');
        }
    </script>
</body>
</html>
